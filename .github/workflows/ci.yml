name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: npm test
      - name: Self-lint — the kit's own payload passes its own linter
        run: node plugins/antigravity-meta-plugin-kit/scripts/lint.mjs .
      - name: Smoke — create --dry-run writes nothing
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/plugins/antigravity-meta-plugin-kit/scripts/create.mjs" demo-plugin --dry-run | grep -q "would create"
          test ! -e demo-plugin
      - name: Smoke — create a native-only plugin, lint it, run its tests
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/plugins/antigravity-meta-plugin-kit/scripts/create.mjs" demo-plugin
          node "$GITHUB_WORKSPACE/plugins/antigravity-meta-plugin-kit/scripts/lint.mjs" demo-plugin
          test ! -e demo-plugin/bin -a ! -e demo-plugin/installer   # native-only: no installer machinery
          cd demo-plugin
          npm test

  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint the reference antigravity-kit payload
        run: |
          ref="$(mktemp -d)"
          git clone --depth 1 https://github.com/sipki-tech/antigravity-kit "$ref/antigravity-kit"
          node plugins/antigravity-meta-plugin-kit/scripts/lint.mjs "$ref/antigravity-kit/plugins/antigravity-kit"
