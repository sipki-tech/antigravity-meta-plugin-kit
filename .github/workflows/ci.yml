name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: npm test
      - name: Self-lint — the kit's own payload passes its own linter
        run: node bin/cli.mjs lint .
      - name: Smoke — install the kit plugin into a temp workspace
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/bin/cli.mjs" install --workspace
          node "$GITHUB_WORKSPACE/bin/cli.mjs" verify --workspace
          node "$GITHUB_WORKSPACE/bin/cli.mjs" uninstall --workspace
          test ! -e .agents/plugins/antigravity-meta-plugin-kit
      - name: Smoke — create --dry-run writes nothing
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/bin/cli.mjs" create demo-plugin --dry-run | grep -q "would create"
          test ! -e demo-plugin
      - name: Smoke — create, lint, scaffolded tests, installer dry-run
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/bin/cli.mjs" create demo-plugin
          node "$GITHUB_WORKSPACE/bin/cli.mjs" lint demo-plugin
          cd demo-plugin
          npm test
          node bin/cli.mjs install --workspace --dry-run | grep -q "would install"

  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Lint the reference antigravity-kit payload
        run: |
          ref="$(mktemp -d)"
          git clone --depth 1 https://github.com/sipki-tech/antigravity-kit "$ref/antigravity-kit"
          node bin/cli.mjs lint "$ref/antigravity-kit/plugins/antigravity-kit"
