name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Unit tests
        run: npm test
      - name: Installer smoke — dry run writes nothing
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/bin/cli.mjs" install --workspace --dry-run | grep -q "would install"
          test ! -e .agents
      - name: Installer smoke — real workspace install + verify
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/bin/cli.mjs" install --workspace
          node "$GITHUB_WORKSPACE/bin/cli.mjs" verify --workspace
